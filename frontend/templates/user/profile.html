<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile | Medica</title>
<link rel="stylesheet" href="/static/css/style.css">

<style>

/* ===== PAGE ===== */
.profile-container{
  padding:60px 20px;
  background:#f6f9fd;
  min-height:100vh;
}

.profile-card h2 {
  text-align: center;
  color: #0b5ed7;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid #0b5ed7;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 20px;
}

/* ===== IMAGE ===== */
.profile-image-box{
  text-align:center;
  margin-bottom:30px;
  position:relative;
}

.profile-image{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #e3ecff;
}

.camera-btn{
  position:absolute;
  bottom:10px;
  right:calc(50% - 70px);
  background:#0b5ed7;
  color:white;
  padding:8px 10px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
}

/* ===== FORM ===== */
.form-group{
  margin-bottom:18px;
}

.form-group label{
  display:block;
  font-weight:600;
  margin-bottom:6px;
  color:#0b5ed7;
}

.form-group input{
  width:100%;
  padding:13px;
  border-radius:10px;
  border:1px solid #ccd6e6;
  font-size:14px;
}

/* ===== BUTTON ===== */
.save-btn{
  width:100%;
  margin-top:10px;
  padding:14px;
  background:#1e7e34;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.save-btn:hover{
  background:#166a2a;
}

/* SUCCESS */
.success-msg{
  margin-top:15px;
  background:#e6ffed;
  padding:12px;
  border-radius:10px;
  color:#1e7e34;
  font-weight:600;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .profile-container {
    padding: 40px 15px;
  }

  .profile-card {
    max-width: 100%;
    padding: 25px 20px;
    border-radius: 15px;
  }

  .profile-card h2 {
    font-size: 20px;
    margin-bottom: 15px;
  }

  .profile-image {
    width: 120px;
    height: 120px;
    border: 4px solid #e3ecff;
  }

  .camera-btn {
    bottom: 5px;
    right: calc(50% - 60px);
    padding: 6px 8px;
    font-size: 12px;
  }

  .form-group {
    margin-bottom: 15px;
  }

  .form-group label {
    font-size: 14px;
    margin-bottom: 5px;
  }

  .form-group input {
    padding: 11px;
    font-size: 14px;
    border-radius: 8px;
  }

  .save-btn {
    padding: 12px;
    font-size: 15px;
    border-radius: 8px;
  }

  .success-msg {
    font-size: 13px;
    padding: 10px;
  }
}

@media (max-width: 480px) {
  .profile-container {
    padding: 20px 10px;
    min-height: 100vh;
  }

  .profile-card {
    padding: 15px 12px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.06);
  }

  .profile-card h2 {
    font-size: 18px;
    margin-bottom: 12px;
  }

  .profile-image-box {
    margin-bottom: 20px;
  }

  .profile-image {
    width: 100px;
    height: 100px;
    border: 3px solid #e3ecff;
  }

  .camera-btn {
    bottom: 0;
    right: calc(50% - 50px);
    padding: 5px 7px;
    font-size: 12px;
  }

  .form-group {
    margin-bottom: 12px;
  }

  .form-group label {
    font-size: 13px;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .form-group input {
    padding: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccd6e6;
  }

  .form-group input:focus {
    outline: none;
    border-color: #0b5ed7;
    box-shadow: 0 0 5px rgba(11, 94, 215, 0.2);
  }

  .save-btn {
    padding: 11px;
    font-size: 14px;
    border-radius: 6px;
    margin-top: 8px;
  }

  .success-msg {
    font-size: 12px;
    padding: 8px;
    margin-top: 10px;
  }
}

</style>
</head>

<body>

{% include "layout/header.html" %}

<div class="profile-container">
<div class="profile-card">

<h2>User Profile</h2>

<form method="POST" enctype="multipart/form-data">

<!-- PROFILE IMAGE -->
<div class="profile-image-box">

<img
src="{{ user.profile_image if user.profile_image else '/static/images/default-user.png' }}"
class="profile-image"
>

<input type="file" name="profile_image" id="fileInput" hidden>

<label for="fileInput" class="camera-btn">
📷
</label>

</div>

<!-- NAME -->
<div class="form-group">
<label>Full Name</label>
<input
type="text"
name="name"
value="{{ user.name or '' }}"
required
>
</div>

<!-- EMAIL -->
<div class="form-group">
<label>Email Address</label>
<input
type="email"
name="email"
value="{{ user.email or '' }}"
required
>
</div>

<!-- PHONE -->
<div class="form-group">
<label>Phone Number</label>
<input
type="text"
name="phone"
value="{{ user.phone or '' }}"
>
</div>

<!-- ADDRESS -->
<div class="form-group">
<label>Address</label>
<input
type="text"
name="address"
value="{{ user.address or '' }}"
>
</div>

<button class="save-btn">
Save Profile
</button>

</form>

{% if saved %}
<div class="success-msg">
Profile Saved Successfully ✅
</div>
{% endif %}

</div>
</div>

<footer>
© 2026 Medica – AI Clinical Decision Support
</footer>

<script src="/static/js/main.js"></script>
</body>
</html>
